server {
    listen 80;
    server_name _;

    # TanStack Start produce la build en dist/client/
    root /usr/share/nginx/html/client;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # SPA: redirige todas las rutas a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso: las llamadas a /api/ se redirigen al backend
    location /api/ {
        proxy_pass http://api:8888/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para el chatbot LLM (respuestas lentas)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Caché agresivo para assets estáticos (Vite genera hashes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
